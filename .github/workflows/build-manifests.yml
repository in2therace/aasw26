name: Build image manifests

# Hält images/images.json und results/images.json automatisch aktuell,
# sobald Bilder in die Ordner gezogen (committet) werden. So braucht die
# Website die GitHub-API nicht mehr (kein 60/Std-Limit) und der Slider bleibt stabil.

on:
  push:
    paths:
      - 'images/**'
      - 'results/**'
      - '!images/images.json'
      - '!results/images.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-manifests
  cancel-in-progress: true

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifests
        run: |
          python3 - <<'PY'
          import os, json
          exts = ('.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg')
          for d in ('images', 'results'):
              if not os.path.isdir(d):
                  continue
              files = sorted(
                  (f for f in os.listdir(d)
                   if f.lower().endswith(exts) and f != 'images.json'),
                  key=str.lower,
              )
              with open(os.path.join(d, 'images.json'), 'w', encoding='utf-8') as fh:
                  json.dump(files, fh, ensure_ascii=False, indent=0)
              print(d, '->', files)
          PY

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/images.json results/images.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Änderung an den Manifesten."
          else
            git commit -m "chore: Bild-Manifeste aktualisieren [skip ci]"
            git push
          fi
