<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Display</title>
  <style>
    /* ===== Konfig: hier bei Bedarf anpassen ===== */
    /* Farbschema: In2theBlue / Alpe Adria Sailing Week (Navy + Türkis) */
    :root {
      --slide-seconds: 6s;      /* Wechseldauer Foto-Slider */
      --fade-seconds: 1s;       /* Fade-Übergang Foto-Slider */
      --result-fade: 0.8s;      /* Fade-Übergang Ergebnis-Karussell */
      --navy-deep: #0c2448;
      --navy: #15315a;
      --teal: #159ca8;
      --teal-bright: #2bc0d4;
      --panel: #12325c;
      --panel-edge: #1d5878;
      --ink: #eaf6fb;
      --ink-dim: #8fb6cc;
      --gap: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: none;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #frame {
      aspect-ratio: 9 / 16;
      height: 100%;
      max-width: 100%;
      background: radial-gradient(120% 60% at 50% 0%, var(--navy) 0%, var(--navy-deep) 60%, #07182f 100%);
      display: grid;
      grid-template-rows: 9% 60% 31%;
      gap: var(--gap);
      padding: var(--gap);
    }

    .section {
      background: linear-gradient(160deg, var(--panel) 0%, var(--navy-deep) 100%);
      border: 1px solid var(--panel-edge);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }

    /* ===== Abschnitt 1: Logo-Banner ===== */
    #logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 14px 22px;
      background: linear-gradient(160deg, #ffffff 0%, #eef7fb 100%);
      border-color: #cfe6ef;
    }
    #logo img { height: auto; width: auto; object-fit: contain; }
    #logo .logo-aasw { max-height: 100%; max-width: 40%; }
    #logo .logo-yca  { max-height: 64%;  max-width: 28%; }

    /* ===== Abschnitt 2: Ergebnis-Karussell ===== */
    #results { padding: 0; }

    #results-heading {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 2;
      padding: 16px 22px 14px;
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 4px;
      border-bottom: 3px solid var(--teal);
      background: linear-gradient(160deg, var(--panel) 0%, var(--navy-deep) 100%);
    }

    #results-carousel {
      position: absolute;
      inset: 82px 0 78px 0;
    }

    .result-slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity var(--result-fade) ease-in-out;
      padding: 12px 16px 10px;
    }
    .result-slide.active { opacity: 1; }

    .slide-header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--panel-edge);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .slide-header .day-tag {
      display: block;
      font-size: 1.0rem;
      font-weight: 700;
      color: var(--teal-bright);
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }
    .slide-header .class-name {
      display: block;
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.15;
    }
    .slide-header .race-label {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Tabellen-Bereich: 1-spaltig oder 2-spaltig je nach Bootszahl */
    .result-tables {
      flex: 1;
      display: flex;
      gap: 6px;
      overflow: hidden;
      min-height: 0;
    }
    .result-tables.single  { flex-direction: column; }
    .result-tables.two-col { flex-direction: row; }

    .table-wrap {
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1em;       /* erbt von .result-tables — wird per JS gesetzt */
      line-height: 1.3;
    }

    .table-wrap thead th {
      background: var(--teal);
      color: #fff;
      font-weight: 700;
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.58em 0.55em;
      text-align: left;
    }

    .table-wrap td {
      padding: 0.58em 0.55em;
      color: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 0;          /* forces ellipsis in table cells */
    }

    .table-wrap tbody tr:nth-child(even) td {
      background: rgba(255,255,255,0.04);
    }

    .table-wrap th.col-pos,
    .table-wrap td.col-pos { text-align: center; width: 2em; max-width: none; }

    .table-wrap th.col-pts,
    .table-wrap td.col-pts { text-align: right; width: 3em; max-width: none; font-weight: 700; }

    .table-wrap th.col-sail,
    .table-wrap td.col-sail { color: var(--ink-dim); width: 4.5em; max-width: none; }

    .table-wrap td.col-club { color: var(--ink-dim); }

    .results-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-dim);
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }
    .results-status.hidden { display: none; }

    /* ===== Abschnitt 3: Foto-Slider ===== */
    #photo-footer {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 20px 0;
      border-top: 2px solid var(--panel-edge);
      background: linear-gradient(160deg, var(--panel) 0%, var(--navy-deep) 100%);
      pointer-events: none;
    }
    #photo-footer-link {
      text-align: center;
      font-size: 2.0rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink);
    }
    #photo-footer-link b { color: var(--teal-bright); }
    #photo-progress {
      height: 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.18);
      overflow: hidden;
    }
    #photo-progress-fill {
      height: 100%;
      width: 0;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--teal) 0%, var(--teal-bright) 100%);
    }

    #slider .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--fade-seconds) ease-in-out;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }
    #slider .slide.active { opacity: 1; }

    .status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-dim);
      font-size: 1.1rem;
      text-align: center;
      padding: 20px;
    }
    .status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="frame">

      <section id="logo" class="section">
        <img class="logo-aasw" src="assets/AASW_interhome.png" alt="Alpe Adria Sailing Week – powered by Interhome" />
        <img class="logo-yca"  src="assets/YCA_Logo_Flagge.png" alt="Yacht Club Austria" />
      </section>

      <section id="results" class="section">
        <div id="results-heading">Ergebnisse</div>
        <div id="results-carousel"></div>
        <div id="results-status" class="results-status">Ergebnisse werden geladen…</div>
        <div id="photo-footer">
          <span id="photo-footer-link">Alle Ergebnisse: <b>aasw.at</b></span>
          <div id="photo-progress"><div id="photo-progress-fill"></div></div>
        </div>
      </section>

      <section id="slider" class="section">
        <div id="slider-status" class="status">Bilder werden geladen…</div>
      </section>

    </div>
  </div>

  <script>
    // ===== Konfiguration =====
    const REPO           = "in2therace/aasw26";
    const BRANCH         = "main";
    const SLIDER_DIR     = "images";
    const DATA_DIR       = "data";
    const SLIDE_MS       = 6000;         // Foto-Slider: Wechseldauer (ms)
    const RESULT_SLIDE_MS = 10000;       // Ergebnis-Karussell: Wechseldauer (ms)
    const REFRESH_MS     = 3 * 60 * 1000;
    const IMG_RE         = /\.(jpe?g|png|gif|webp|svg)$/i;

    // ===== Hilfsfunktionen =====
    function setStatus(el, msg) {
      if (!msg) { el.classList.add("hidden"); return; }
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    // Bilder-URLs aus Manifest oder GitHub-API holen
    async function fetchImageUrls(dir) {
      try {
        const res = await fetch(`${dir}/images.json?_=${Date.now()}`, { cache: "no-store" });
        if (res.ok) {
          const names = await res.json();
          const urls = names.filter(n => IMG_RE.test(n)).map(n => `${dir}/${encodeURIComponent(n)}`);
          if (urls.length) return urls;
        }
      } catch (e) { /* Fallback */ }

      try {
        const api = `https://api.github.com/repos/${REPO}/contents/${dir}?ref=${BRANCH}`;
        const res = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
        if (res.ok) {
          const items = await res.json();
          return items
            .filter(it => it.type === "file" && IMG_RE.test(it.name))
            .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))
            .map(it => it.download_url);
        }
      } catch (e) { /* nichts */ }

      return [];
    }

    // ===== Ergebnis-Karussell (Mitte) =====
    const resultsCarousel = document.getElementById("results-carousel");
    const resultsStatus   = document.getElementById("results-status");
    const progressFill    = document.getElementById("photo-progress-fill");
    let resultTimer = null;
    let currentSlides = [];

    // Ladestreifen unten füllt sich linear, bis die Ergebnisse wechseln.
    function startResultProgress() {
      if (!progressFill) return;
      progressFill.style.transition = "none";
      progressFill.style.width = "0%";
      void progressFill.offsetWidth;            // Reflow erzwingen → Animation startet neu
      progressFill.style.transition = `width ${RESULT_SLIDE_MS}ms linear`;
      progressFill.style.width = "100%";
    }

    async function loadResultsCarousel() {
      try {
        const manifest = await fetch(`${DATA_DIR}/manifest.json?_=${Date.now()}`, { cache: "no-store" });
        if (!manifest.ok) throw new Error("kein Manifest");
        const { current, days } = await manifest.json();
        const dayFile = days.find(d => d.includes(current)) ?? days.at(-1);
        if (!dayFile) throw new Error("kein Tag");
        const dayRes = await fetch(`${DATA_DIR}/${dayFile}`, { cache: "no-store" });
        if (!dayRes.ok) throw new Error("Tag nicht gefunden");
        const day = await dayRes.json();
        buildCarousel(day);
      } catch (e) {
        if (!resultsCarousel.children.length)
          setStatus(resultsStatus, "Noch keine Ergebnisse verfügbar.");
      }
    }

    function buildCarousel(day) {
      resultsCarousel.innerHTML = "";
      if (resultTimer) clearInterval(resultTimer);

      // Eine Tabelle pro Slide.
      //  - ORC-Klassen (type "orc"): Gesamtwertung + eine Slide je Rennen.
      //  - Einheitsklassen (type "onedesign"): nur Gesamtwertung.
      const slides = [];
      for (const cls of day.classes) {
        const type = String(cls.type || "").toLowerCase();
        const races = Array.isArray(cls.races) ? cls.races : [];
        const showRaces = type !== "onedesign" && races.length > 0;

        slides.push(makeSlide(day, cls, "Gesamtwertung", cls.overall || []));
        if (showRaces) {
          for (const race of races) {
            slides.push(makeSlide(day, cls, race.label, race.rows || []));
          }
        }
      }
      if (!slides.length) return;

      setStatus(resultsStatus, null);
      let ridx = 0;
      slides.forEach((s, i) => {
        if (i === 0) s.classList.add("active");
        resultsCarousel.appendChild(s);
      });

      // Schriftgröße jeder Tabelle an die verfügbare Höhe anpassen
      currentSlides = slides;
      fitAllSlides();

      if (slides.length > 1) {
        startResultProgress();
        resultTimer = setInterval(() => {
          slides[ridx].classList.remove("active");
          ridx = (ridx + 1) % slides.length;
          slides[ridx].classList.add("active");
          fitTableFont(slides[ridx]);
          startResultProgress();
        }, RESULT_SLIDE_MS);
      } else if (progressFill) {
        progressFill.style.transition = "none";
        progressFill.style.width = "100%";
      }
    }

    // Tabelle so skalieren, dass alle Zeilen in den Panel-Bereich passen.
    // Kleine Felder werden größer, große Felder kleiner — immer ohne Überlauf.
    // Schrift des .result-tables Containers so skalieren, dass alle Tabellen
    // (1-col oder 2-col) ohne Überlauf in den verfügbaren Bereich passen.
    function fitTableFont(slide) {
      const rt    = slide.querySelector(".result-tables");
      if (!rt || !rt.clientHeight) return;
      const wraps = [...rt.querySelectorAll(".table-wrap")];
      const MIN = 0.42, MAX = 2.2;
      let lo = MIN, hi = MAX, best = MIN;
      for (let i = 0; i < 14; i++) {
        const mid = (lo + hi) / 2;
        rt.style.fontSize = mid + "rem";
        const fits = wraps.every(w => {
          const t = w.querySelector("table");
          return t && t.scrollHeight <= w.clientHeight + 1
                   && t.scrollWidth  <= w.clientWidth  + 1;
        });
        if (fits) { best = mid; lo = mid; }
        else { hi = mid; }
      }
      rt.style.fontSize = best + "rem";
    }

    function fitAllSlides(attempt = 0) {
      const rt = currentSlides[0] && currentSlides[0].querySelector(".result-tables");
      // Layout noch nicht bereit (Höhe 0) → kurz erneut versuchen
      if ((!rt || !rt.clientHeight) && attempt < 30) {
        setTimeout(() => fitAllSlides(attempt + 1), 60);
        return;
      }
      currentSlides.forEach(fitTableFont);
    }

    const SPLIT_THRESHOLD = 24;   // > N Boote → 2-Spalten-Layout

    function makeTableHtml(rows, cols, labels, clsMap) {
      const thHtml = cols.map(c => `<th class="${clsMap[c]||""}">${labels[c]}</th>`).join("");
      const tbodyHtml = (rows || []).map(r =>
        `<tr>${cols.map(c => `<td class="${clsMap[c]||""}">${escHtml(String(r[c]??""))}</td>`).join("")}</tr>`
      ).join("");
      return `<div class="table-wrap"><table>
        <thead><tr>${thHtml}</tr></thead>
        <tbody>${tbodyHtml}</tbody>
      </table></div>`;
    }

    function makeSlide(day, cls, raceLabel, rows) {
      const useTwoCol = (rows || []).length > SPLIT_THRESHOLD;
      // 2-spaltig: kompakt (#, Bogen, Boot, Skipper, Pkt) — kein Club
      // 1-spaltig: voll  (#, Bogen, Boot, Skipper, Club, Pkt)
      const COLS   = useTwoCol
        ? ["pos", "sail", "boat", "skipper", "pts"]
        : ["pos", "sail", "boat", "skipper", "club", "pts"];
      const LABELS = { pos: "#", sail: "Bogen", boat: "Boot", skipper: "Skipper", club: "Club", pts: "Pkt" };
      const CLS    = { pos: "col-pos", sail: "col-sail", club: "col-club", pts: "col-pts" };

      const div = document.createElement("div");
      div.className = "result-slide";

      const headerHtml = `
        <div class="slide-header">
          <span class="day-tag">${escHtml(day.dayLabel)} &mdash; ${escHtml(day.date)}</span>
          <span class="class-name">${escHtml(cls.name)}</span>
          <span class="race-label">${escHtml(raceLabel)}</span>
        </div>`;

      let tablesHtml;
      if (useTwoCol) {
        const half  = Math.ceil(rows.length / 2);
        const left  = rows.slice(0, half);
        const right = rows.slice(half);
        tablesHtml = `<div class="result-tables two-col">
          ${makeTableHtml(left,  COLS, LABELS, CLS)}
          ${makeTableHtml(right, COLS, LABELS, CLS)}
        </div>`;
      } else {
        tablesHtml = `<div class="result-tables single">
          ${makeTableHtml(rows, COLS, LABELS, CLS)}
        </div>`;
      }

      div.innerHTML = headerHtml + tablesHtml;
      return div;
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ===== Foto-Slider (unten) =====
    const slider      = document.getElementById("slider");
    const sliderStatus = document.getElementById("slider-status");
    let photoSlides  = [];
    let currentUrls  = "";
    let pidx         = 0;
    let slideTimer   = null;

    function buildPhotoSlides(urls) {
      slider.querySelectorAll(".slide").forEach(el => el.remove());
      photoSlides = urls.map(url => {
        const div = document.createElement("div");
        div.className = "slide";
        div.style.backgroundImage = `url("${url}")`;
        slider.appendChild(div);
        return div;
      });
      pidx = 0;
      if (photoSlides.length) photoSlides[0].classList.add("active");
    }

    function advancePhoto() {
      if (photoSlides.length < 2) return;
      photoSlides[pidx].classList.remove("active");
      pidx = (pidx + 1) % photoSlides.length;
      photoSlides[pidx].classList.add("active");
    }

    async function loadAndRender() {
      const urls = await fetchImageUrls(SLIDER_DIR);
      const sig = urls.join("|");
      if (!urls.length) {
        if (!photoSlides.length) setStatus(sliderStatus, "Noch keine Bilder im Ordner /images");
        return;
      }
      if (sig === currentUrls) return;
      currentUrls = sig;
      setStatus(sliderStatus, null);
      buildPhotoSlides(urls);
      if (slideTimer) clearInterval(slideTimer);
      if (photoSlides.length > 1) slideTimer = setInterval(advancePhoto, SLIDE_MS);
    }

    // Tabellen bei Größenänderung des Fensters neu einpassen
    let fitResizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(fitResizeTimer);
      fitResizeTimer = setTimeout(fitAllSlides, 200);
    });

    // ===== Start =====
    loadResultsCarousel();
    loadAndRender();
    setInterval(loadResultsCarousel, REFRESH_MS);
    setInterval(loadAndRender, REFRESH_MS);
  </script>
</body>
</html>
